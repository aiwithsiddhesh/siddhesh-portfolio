name: Notion Blog Sync

on:
  schedule:
    - cron: '0/30 * * * *'  # every 30 minutes
  workflow_dispatch:          # manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Check Notion for new published posts & deploy
        run: |
          echo "Checking Notion for published posts..."

          RESPONSE=$(curl -s -X POST \
            "https://api.notion.com/v1/databases/${{ secrets.NOTION_BLOG_DATABASE_ID }}/query" \
            -H "Authorization: Bearer ${{ secrets.NOTION_API_KEY }}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d '{
              "filter": {
                "property": "Published",
                "checkbox": { "equals": true }
              }
            }')

          COUNT=$(echo "$RESPONSE" | grep -o '"id"' | wc -l)
          echo "Published posts found: $COUNT"

          if [ "$COUNT" -gt "0" ]; then
            echo "Posts found — triggering Vercel deploy..."
            curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
            echo "Deploy triggered."
          else
            echo "No published posts — skipping deploy."
          fi
