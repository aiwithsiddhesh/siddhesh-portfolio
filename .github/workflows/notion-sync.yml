name: Notion Blog Sync

on:
  schedule:
    - cron: '0/30 * * * *'  # every 30 minutes
  workflow_dispatch:          # manual trigger from GitHub Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel deploy to pick up latest Notion content
        run: |
          echo "Triggering Vercel deploy to refresh Notion content..."
          curl -s -X POST "${{ secrets.VERCEL_DEPLOY_HOOK }}"
          echo "Deploy triggered."
